<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Airdoor HR Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: { primary: { DEFAULT: '#0f766e', foreground: '#fff' } } } }
}
</script>
<style>
  :root { --primary: #0f766e; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; margin: 0; }
  /* Sidebar */
  .sidebar { width: 240px; min-height: 100vh; background: #1e293b; color: #e2e8f0; position: fixed; top: 0; left: 0; z-index: 40; display: flex; flex-direction: column; transition: transform .3s; }
  .main { margin-left: 240px; min-height: 100vh; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; border-radius: 8px; margin: 2px 8px; font-size: 13px; color: #94a3b8; transition: all .15s; }
  .nav-item:hover { background: #334155; color: #fff; }
  .nav-item.active { background: #0f766e; color: #fff; }
  /* Cards */
  .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 20px; }
  .stat-card { background: #fff; border-radius: 12px; padding: 18px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  /* Badges */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-green { background: #dcfce7; color: #166534; }
  .badge-red { background: #fee2e2; color: #991b1b; }
  .badge-yellow { background: #fef9c3; color: #854d0e; }
  .badge-blue { background: #dbeafe; color: #1e40af; }
  .badge-gray { background: #f1f5f9; color: #475569; }
  .badge-purple { background: #f3e8ff; color: #7e22ce; }
  .badge-teal { background: #ccfbf1; color: #0f766e; }
  .badge-orange { background: #ffedd5; color: #c2410c; }
  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; text-decoration: none; }
  .btn-primary { background: #0f766e; color: #fff; }
  .btn-primary:hover { background: #0d6460; }
  .btn-outline { background: #fff; color: #374151; border: 1px solid #d1d5db; }
  .btn-outline:hover { background: #f9fafb; }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-success { background: #22c55e; color: #fff; }
  .btn-success:hover { background: #16a34a; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  /* Form */
  .input { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; outline: none; transition: border .15s; box-sizing: border-box; }
  .input:focus { border-color: #0f766e; box-shadow: 0 0 0 3px rgba(15,118,110,.1); }
  .label { display: block; font-size: 12px; font-weight: 500; color: #374151; margin-bottom: 4px; }
  textarea.input { resize: vertical; }
  select.input { cursor: pointer; }
  /* Table */
  table { width: 100%; border-collapse: collapse; }
  th { background: #f8fafc; padding: 9px 14px; text-align: left; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid #e2e8f0; }
  td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid #f1f5f9; }
  tr:hover td { background: #f8fafc; }
  /* Modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal { background: #fff; border-radius: 16px; padding: 0; width: 480px; max-width: 100%; max-height: 90vh; overflow-y: auto; }
  /* Calendar */
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
  .cal-day { position: relative; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all .12s; user-select: none; }
  .cal-day:hover { transform: scale(1.08); opacity: .85; }
  .cal-day.today { outline: 2px solid #0f766e; outline-offset: 1px; }
  .cal-day.future { cursor: default; }
  .cal-day.future:hover { transform: none; opacity: 1; }
  .cal-present { background: #dcfce7; color: #166534; border-color: #86efac; }
  .cal-half_day { background: #fef9c3; color: #854d0e; border-color: #fde68a; }
  .cal-absent { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
  .cal-sunday_work { background: #ccfbf1; color: #0f766e; border-color: #5eead4; }
  .cal-holiday_work { background: #f3e8ff; color: #7e22ce; border-color: #d8b4fe; }
  .cal-leave { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }
  .cal-holiday { background: #f3e8ff; color: #7e22ce; border-color: #c4b5fd; }
  .cal-sunday { background: #f1f5f9; color: #94a3b8; border-color: transparent; cursor: default; }
  .cal-sunday:hover { transform: none; }
  .cal-pending { background: #ffedd5; color: #c2410c; border-color: #fdba74; }
  .cal-not_submitted { background: #fff1f2; color: #be123c; border-color: #fda4af; }
  .cal-today_log { background: #fefce8; color: #854d0e; border-color: #fde047; }
  /* Toast */
  .toast { position: fixed; bottom: 80px; right: 20px; z-index: 999; padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; animation: slideUp .3s ease; pointer-events: none; }
  .toast-success { background: #1e293b; color: #fff; }
  .toast-error { background: #ef4444; color: #fff; }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  /* Mobile */
  .mobile-header { display: none; position: sticky; top: 0; z-index: 30; background: #fff; border-bottom: 1px solid #e2e8f0; padding: 10px 16px; align-items: center; justify-content: space-between; }
  .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 40; background: #fff; border-top: 1px solid #e2e8f0; height: 60px; }
  .bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; font-size: 10px; font-weight: 600; color: #94a3b8; cursor: pointer; transition: color .15s; text-decoration: none; }
  .bottom-nav-item.active, .bottom-nav-item:hover { color: #0f766e; }
  .bottom-nav-mark { width: 40px; height: 40px; border-radius: 50%; background: #0f766e; display: flex; align-items: center; justify-content: center; margin-top: -18px; box-shadow: 0 4px 12px rgba(15,118,110,.4); }
  /* Notif dot */
  .notif-dot { position: absolute; top: -3px; right: -3px; width: 14px; height: 14px; border-radius: 50%; background: #ef4444; color: #fff; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  /* Alert banner */
  .alert-amber { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: #fffbeb; border: 1px solid #fcd34d; border-radius: 12px; margin-bottom: 20px; }
  .alert-blue { display: flex; align-items: flex-start; gap: 12px; padding: 0; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .mobile-header { display: flex; }
    .bottom-nav { display: flex; }
    .main-content-pad { padding: 16px 16px 80px; }
  }
  @media (min-width: 769px) {
    .main-content-pad { padding: 28px 32px; }
  }
  @media print {
    .no-print { display: none !important; }
    .main { margin-left: 0; }
    .mobile-header { display: none !important; }
    .bottom-nav { display: none !important; }
  }
</style>
</head>
<body>

<!-- APP SHELL -->
<div id="appShell" style="display:none">

  <!-- Sidebar (desktop) -->
  <div class="sidebar no-print" id="sidebar">
    <div style="padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #334155">
      <div style="width:30px;height:30px;background:#0f766e;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:15px;">A</div>
      <span style="font-weight:700;font-size:14px;">Airdoor HR Portal</span>
    </div>
    <nav id="sideNav" style="flex:1;padding:10px 0;overflow-y:auto"></nav>
    <div style="padding:10px 8px;border-top:1px solid #334155">
      <!-- User info -->
      <div id="sideUser" style="padding:8px 12px;font-size:12px;color:#94a3b8;margin-bottom:4px;"></div>
      <!-- Switch account -->
      <div id="switchWrap" style="margin-bottom:4px;position:relative">
        <div class="nav-item" style="justify-content:space-between" onclick="toggleSwitcher()">
          <div style="display:flex;align-items:center;gap:8px">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 3l4 4-4 4"/><path d="M20 7H4"/><path d="M8 21l-4-4 4-4"/><path d="M4 17h16"/></svg>
            Switch Account
          </div>
          <svg id="switchChevron" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div id="switchMenu" style="display:none;background:#0f1729;border-radius:8px;margin:2px 8px;overflow:hidden"></div>
      </div>
      <div class="nav-item" onclick="doLogout()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Mobile header -->
    <div class="mobile-header no-print">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:26px;height:26px;background:#0f766e;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:13px;">A</div>
        <span style="font-weight:700;font-size:13px;">Airdoor HR</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <!-- Mobile switch -->
        <div style="position:relative">
          <button onclick="toggleMobileSwitcher()" style="padding:6px 10px;border:1px solid #e2e8f0;border-radius:20px;background:#fff;font-size:11px;font-weight:600;color:#64748b;cursor:pointer;display:flex;align-items:center;gap:4px">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 3l4 4-4 4"/><path d="M20 7H4"/><path d="M8 21l-4-4 4-4"/><path d="M4 17h16"/></svg>
            Switch
          </button>
          <div id="mobileSwitchMenu" style="display:none;position:absolute;top:calc(100%+4px);right:0;background:#fff;border:1px solid #e2e8f0;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:160px;z-index:99;overflow:hidden"></div>
        </div>
        <!-- Notification bell -->
        <div style="position:relative">
          <button onclick="toggleNotifPanel()" style="padding:6px;border:none;background:none;cursor:pointer;position:relative">
            <svg width="20" height="20" fill="none" stroke="#64748b" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span id="notifBadge" style="display:none" class="notif-dot">0</span>
          </button>
          <div id="notifPanel" style="display:none;position:absolute;top:calc(100%+4px);right:0;width:300px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:99;overflow:hidden">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #f1f5f9">
              <span style="font-weight:600;font-size:13px">Notifications</span>
              <button onclick="markAllRead()" style="font-size:11px;color:#0f766e;background:none;border:none;cursor:pointer">Mark all read</button>
            </div>
            <div id="notifList" style="max-height:320px;overflow-y:auto"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Desktop topbar notification -->
    <div class="no-print" style="display:none" id="desktopTopbar">
      <div style="padding:10px 32px;border-bottom:1px solid #e2e8f0;background:#fff;display:flex;justify-content:flex-end;align-items:center;gap:8px">
        <div style="position:relative">
          <button onclick="toggleNotifPanel()" style="padding:6px;border:none;background:none;cursor:pointer;position:relative">
            <svg width="20" height="20" fill="none" stroke="#64748b" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span id="notifBadgeDesktop" style="display:none" class="notif-dot">0</span>
          </button>
          <div id="notifPanelDesktop" style="display:none;position:absolute;top:calc(100%+4px);right:0;width:300px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:99;overflow:hidden">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #f1f5f9">
              <span style="font-weight:600;font-size:13px">Notifications</span>
              <button onclick="markAllRead()" style="font-size:11px;color:#0f766e;background:none;border:none;cursor:pointer">Mark all read</button>
            </div>
            <div id="notifListDesktop" style="max-height:320px;overflow-y:auto"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="main-content-pad" id="mainContent"></div>
  </div>

  <!-- Mobile bottom nav (employee only) -->
  <div class="bottom-nav no-print" id="bottomNav" style="display:none">
    <div style="display:flex;height:100%;align-items:stretch">
      <div class="bottom-nav-item" id="bn-home" onclick="navigate('/dashboard')">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Home
      </div>
      <div class="bottom-nav-item" id="bn-att" onclick="navigate('/attendance/history')">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        History
      </div>
      <div class="bottom-nav-item" id="bn-mark" onclick="navigate('/attendance/submit')">
        <div class="bottom-nav-mark">
          <svg width="20" height="20" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        Mark
      </div>
      <div class="bottom-nav-item" id="bn-leaves" onclick="navigate('/leaves/apply')">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Leaves
      </div>
      <div class="bottom-nav-item" id="bn-profile" onclick="navigate('/profile')">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profile
      </div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal-backdrop" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalInner"></div>
</div>

<div id="toastEl" class="toast toast-success" style="display:none"></div>

<script>
// =================== DATA LAYER ===================
const USERS_KEY='hr_users',ATT_KEY='hr_att',LEAVE_KEY='hr_leaves',HOL_KEY='hr_holidays',SAL_KEY='hr_salary',NOTIF_KEY='hr_notifs';

const SEED_USERS=[
  {id:1,username:'admin',password:'admin123',name:'Admin User',role:'admin',email:'admin@airdoor.com',phone:'',designation:'HR Manager',department:'HR',monthlySalary:0,isActive:true,createdAt:'2024-01-01'},
  {id:2,username:'john',password:'emp123',name:'John Mathew',role:'employee',email:'john@airdoor.com',phone:'+91 9876543210',designation:'Software Engineer',department:'Engineering',monthlySalary:50000,isActive:true,createdAt:'2024-01-15'},
  {id:3,username:'priya',password:'emp123',name:'Priya Nair',role:'employee',email:'priya@airdoor.com',phone:'+91 9876543211',designation:'Designer',department:'Design',monthlySalary:45000,isActive:true,createdAt:'2024-01-20'},
  {id:4,username:'ravi',password:'emp123',name:'Ravi Kumar',role:'employee',email:'ravi@airdoor.com',phone:'+91 9876543212',designation:'QA Engineer',department:'Engineering',monthlySalary:42000,isActive:true,createdAt:'2024-02-01'},
];
const SEED_HOL=[
  {id:1,name:'Republic Day',date:'2025-01-26'},
  {id:2,name:'Holi',date:'2025-03-17'},
  {id:3,name:'Independence Day',date:'2025-08-15'},
  {id:4,name:'Gandhi Jayanti',date:'2025-10-02'},
  {id:5,name:'Diwali',date:'2025-10-20'},
  {id:6,name:'Christmas',date:'2025-12-25'},
];

function load(key,fallback){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch{return fallback;}}
function save(key,val){localStorage.setItem(key,JSON.stringify(val));}
function getUsers(){return load(USERS_KEY,SEED_USERS);}
function saveUsers(u){save(USERS_KEY,u);}
function getAtt(){return load(ATT_KEY,[]);}
function saveAtt(a){save(ATT_KEY,a);}
function getLeaves(){return load(LEAVE_KEY,[]);}
function saveLeaves(l){save(LEAVE_KEY,l);}
function getHols(){return load(HOL_KEY,SEED_HOL);}
function saveHols(h){save(HOL_KEY,h);}
function getSal(){return load(SAL_KEY,[]);}
function saveSal(s){save(SAL_KEY,s);}
function getNotifs(){return load(NOTIF_KEY,[]);}
function saveNotifs(n){save(NOTIF_KEY,n);}
function nextId(arr){return arr.length?Math.max(...arr.map(x=>x.id))+1:1;}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){if(!d)return'';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function monthName(m){return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1];}
function rupee(n){return'₹'+Number(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function dayName(dateStr){return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(dateStr+'T00:00:00').getDay()];}
function timeAgo(iso){const d=Date.now()-new Date(iso).getTime();const m=Math.floor(d/60000);if(m<1)return'just now';if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';}

// =================== NOTIFICATIONS ===================
function createNotif(userId,title,message,type){
  const notifs=getNotifs();
  notifs.push({id:nextId(notifs),userId,title,message,type,read:false,createdAt:new Date().toISOString()});
  saveNotifs(notifs);
  updateNotifBadge();
}

function updateNotifBadge(){
  if(!currentUser)return;
  const unread=getNotifs().filter(n=>n.userId===currentUser.id&&!n.read);
  const count=unread.length;
  ['notifBadge','notifBadgeDesktop'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    if(count>0){el.style.display='flex';el.textContent=count>9?'9+':count;}
    else el.style.display='none';
  });
}

function renderNotifList(){
  if(!currentUser)return;
  const notifs=getNotifs().filter(n=>n.userId===currentUser.id).sort((a,b)=>b.createdAt.localeCompare(a.createdAt)).slice(0,20);
  const typeIcon={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};
  const html=notifs.length===0
    ?'<div style="padding:24px;text-align:center;color:#94a3b8;font-size:13px">No notifications yet</div>'
    :notifs.map(n=>`
      <div onclick="readNotif(${n.id})" style="padding:12px 14px;border-bottom:1px solid #f1f5f9;cursor:pointer;background:${n.read?'#fff':'#eff6ff'};transition:background .15s" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='${n.read?'#fff':'#eff6ff'}'">
        <div style="display:flex;align-items:flex-start;gap:8px">
          <span style="font-size:14px;flex-shrink:0;margin-top:1px">${typeIcon[n.type]||'ℹ️'}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:600;color:#1e293b;${n.read?'':'font-weight:700'}">${n.title}</div>
            <div style="font-size:11px;color:#64748b;margin-top:2px;line-height:1.4">${n.message}</div>
            <div style="font-size:10px;color:#94a3b8;margin-top:4px">${timeAgo(n.createdAt)}</div>
          </div>
          ${!n.read?'<div style="width:7px;height:7px;border-radius:50%;background:#3b82f6;flex-shrink:0;margin-top:4px"></div>':''}
        </div>
      </div>`).join('');

function attBadge(s){
  const cls={present:'badge-green',absent:'badge-red',half_day:'badge-yellow',sunday_work:'badge-teal',holiday_work:'badge-purple',leave:'badge-blue',pending:'badge-orange',approved:'badge-green',rejected:'badge-red',casual:'badge-blue',sick:'badge-red',comp_off:'badge-teal'};
  const label={present:'Present',absent:'Absent',half_day:'Half Day',sunday_work:'Sunday Work',holiday_work:'Holiday Work',leave:'On Leave',pending:'Pending',approved:'Approved',rejected:'Rejected',casual:'Casual',sick:'Sick',comp_off:'Comp Off'};
  return`<span class="badge ${cls[s]||'badge-gray'}">${label[s]||s}</span>`;
}

function calcSalary(userId,month,year){
  const att=getAtt().filter(a=>a.userId===userId&&a.status==='approved');
  const hols=getHols();
  let paid=0;
  att.forEach(a=>{
    const d=new Date(a.date+'T00:00:00');
    if(d.getFullYear()!==year||d.getMonth()+1!==month)return;
    if(['present','sunday_work','holiday_work'].includes(a.type))paid+=1;
    if(a.type==='half_day')paid+=0.5;
    if(a.type==='leave')paid+=1;
  });
  hols.forEach(h=>{
    const d=new Date(h.date+'T00:00:00');
    if(d.getFullYear()===year&&d.getMonth()+1===month)paid+=1;
  });
  const user=getUsers().find(u=>u.id===userId);
  const monthly=user?Number(user.monthlySalary):0;
  const workDays=26;
  const gross=Math.min(monthly,monthly/workDays*paid);
  return{paid:Math.min(paid,workDays),workDays,gross,deductions:Math.max(0,monthly-gross),net:gross,monthly};
}

function leaveBalance(userId){
  const leaves=getLeaves().filter(l=>l.userId===userId&&l.status==='approved');
  let casual=0,sick=0,compOff=0,compEarned=0;
  leaves.forEach(l=>{
    const days=(new Date(l.endDate)-new Date(l.startDate))/86400000+1;
    if(l.type==='casual')casual+=days;
    if(l.type==='sick')sick+=days;
    if(l.type==='comp_off')compOff+=days;
  });
  // Comp off earned from sunday_work/holiday_work approved
  const attApproved=getAtt().filter(a=>a.userId===userId&&a.status==='approved'&&['sunday_work','holiday_work'].includes(a.type));
  compEarned=attApproved.length;
  return{casualRemaining:Math.max(0,12-casual),casualUsed:casual,sickUsed:sick,compOffEarned:compEarned,compOffRemaining:Math.max(0,compEarned-compOff)};
}

// =================== CALENDAR STATE ===================
let calMonth={y:new Date().getFullYear(),m:new Date().getMonth()+1};

function renderCal(){
  const el=document.getElementById('calGrid');
  if(!el)return;
  const y=calMonth.y,m=calMonth.m;
  document.getElementById('calTitle').textContent=monthName(m)+' '+y;
  const hols=getHols();
  const att=getAtt().filter(a=>a.userId===currentUser.id);
  const attMap={};
  att.forEach(a=>{attMap[a.date]=a;});
  const holMap={};
  hols.forEach(h=>{holMap[h.date]=h.name;});
  const todayStr=today();
  const first=new Date(y,m-1,1);
  const lastDay=new Date(y,m,0).getDate();
  const startDow=first.getDay();
  let html='';
  // padding
  for(let i=0;i<startDow;i++) html+=`<div></div>`;
  for(let d=1;d<=lastDay;d++){
    const ds=y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isSun=new Date(ds+'T00:00:00').getDay()===0;
    const isHol=!!holMap[ds];
    const rec=attMap[ds];
    const isPast=ds<todayStr;
    const isToday=ds===todayStr;
    const isFuture=ds>todayStr;
    let cls='cal-day';
    let statusCls='';
    let extra='';
    let canClick=false;
    if(isToday) cls+=' today';
    if(rec){
      if(rec.status==='pending') statusCls='cal-pending';
      else if(rec.status==='rejected') statusCls='cal-not_submitted';
      else statusCls='cal-'+rec.type;
      canClick=true;
      if(isHol) extra=`<span style="position:absolute;top:2px;right:2px;width:5px;height:5px;border-radius:50%;background:#7c3aed"></span>`;
    } else if(isFuture){
      if(isSun) statusCls='cal-sunday';
      else if(isHol) statusCls='cal-holiday';
      else{cls+=' future';statusCls='';}
    } else if(isToday){
      if(isSun) statusCls='cal-sunday';
      else if(isHol) statusCls='cal-holiday';
      else{statusCls='cal-today_log';canClick=true;}
    } else {
      if(isSun) statusCls='cal-sunday';
      else if(isHol) statusCls='cal-holiday';
      else{statusCls='cal-not_submitted';canClick=true;}
    }
    const onClick=canClick?`onclick="openDayDialog('${ds}')"`:isFuture||isSun||isHol?`onclick="showHolInfo('${ds}','${(isHol?holMap[ds]:'').replace(/'/g,\"\\'\")}',${isSun})"`:'' ;
    html+=`<div class="${cls} ${statusCls}" ${onClick} title="${isHol?holMap[ds]+' ':''}'${d}'">${extra}<span style="line-height:1">${d}</span>${isSun&&!rec?'<span style="font-size:8px;line-height:1;opacity:.6">off</span>':''}</div>`;
  }
  el.innerHTML=html;
}

function calNext(){calMonth.m++;if(calMonth.m>12){calMonth.m=1;calMonth.y++;}renderCal();}

function dayTab(t){

function submitDayAtt(ds){
  const type=document.getElementById('day_att_type').value;
  const notes=document.getElementById('day_att_notes').value.trim();
  const att=getAtt();
  if(att.find(a=>a.userId===currentUser.id&&a.date===ds)){toast('Already submitted for this date','error');return;}
  att.push({id:nextId(att),userId:currentUser.id,date:ds,type,notes,status:'pending',createdAt:new Date().toISOString()});
  saveAtt(att);
  closeModal();
  renderCal();
  toast('Attendance submitted!');
  // Re-render dashboard stats
  if(currentPath==='/dashboard') navigate('/dashboard');
}

function submitDayLeave(ds){
  const type=document.getElementById('day_lv_type').value;
  const start=ds;
  const end=document.getElementById('day_lv_to').value;
  const reason=document.getElementById('day_lv_reason').value.trim();
  if(!reason){toast('Reason required','error');return;}
  if(end<start){toast('End date must be ≥ start date','error');return;}
  const leaves=getLeaves();
  const days=Math.round((new Date(end)-new Date(start))/86400000)+1;
  leaves.push({id:nextId(leaves),userId:currentUser.id,type,startDate:start,endDate:end,days,reason,status:'pending',createdAt:new Date().toISOString()});
  saveLeaves(leaves);
  closeModal();
  toast('Leave applied!');
  if(currentPath==='/dashboard') navigate('/dashboard');
}

function approveAtt(id){
  const att=getAtt();
  const i=att.findIndex(a=>a.id===id);
  if(i<0)return;
  att[i].status='approved';
  saveAtt(att);
  const rec=att[i];
  const isCompOff=['sunday_work','holiday_work'].includes(rec.type);
  createNotif(rec.userId,
    isCompOff?'Attendance Approved + Comp Off Earned':'Attendance Approved',
    isCompOff
      ?`Your ${rec.type.replace(/_/g,' ')} on ${fmtDate(rec.date)} is approved. A Comp Off has been credited.`
      :`Your attendance for ${fmtDate(rec.date)} (${rec.type.replace(/_/g,' ')}) has been approved.`,
    'success'
  );
  navigate(currentPath);
  toast('Attendance approved ✓');
}

function rejectAtt(id){
  const att=getAtt();
  const i=att.findIndex(a=>a.id===id);
  if(i<0)return;
  att[i].status='rejected';
  saveAtt(att);
  const rec=att[i];
  createNotif(rec.userId,'Attendance Rejected',`Your attendance for ${fmtDate(rec.date)} (${rec.type.replace(/_/g,' ')}) was rejected.`,'error');
  navigate(currentPath);
  toast('Attendance rejected');
}

        <td>${salRec?attBadge(salRec.status):'<span class="badge badge-gray">Not Run</span>'}</td>
        <td>${salRec&&salRec.status==='pending'?`<button class="btn btn-success btn-sm" onclick="approveSalary(${u.id},${month},${year})">Approve</button>`:'—'}</td>

function refreshSalary(){const m=Number(document.getElementById('salMonth').value);const y=Number(document.getElementById('salYear').value);document.getElementById('salaryTable').innerHTML=renderSalaryTable(m,y);}
function runPayroll(){
  const m=Number(document.getElementById('salMonth').value);const y=Number(document.getElementById('salYear').value);
  const users=getUsers().filter(u=>u.role==='employee');let sal=getSal();
  users.forEach(u=>{if(!sal.find(s=>s.userId===u.id&&s.month===m&&s.year===y)){const c=calcSalary(u.id,m,y);sal.push({id:nextId(sal),userId:u.id,month:m,year:y,status:'pending',...c});}});
  saveSal(sal);refreshSalary();toast('Payroll generated');
}
function approveSalary(userId,month,year){
  const sal=getSal();const i=sal.findIndex(s=>s.userId===userId&&s.month===month&&s.year===year);
  if(i>=0){sal[i].status='approved';saveSal(sal);}
  const u=getUsers().find(x=>x.id===userId);
  const c=calcSalary(userId,month,year);
  createNotif(userId,'Salary Credited',`Your salary of ${rupee(c.net)} for ${monthName(month)} ${year} has been approved and processed.`,'success');
  refreshSalary();toast('Salary approved');
}

      const days=Math.round((new Date(en)-new Date(s))/86400000)+1;
      b.style.display='block';b.textContent=`Duration: ${days} day${days!==1?'s':''}`;
    }
  }
});

function submitLeave(){
  const type=document.getElementById('lv_type').value;
  const start=document.getElementById('lv_start').value;
  const end=document.getElementById('lv_end').value;
  const reason=document.getElementById('lv_reason').value.trim();
  if(!start||!end||!reason){toast('All fields required','error');return;}
  if(start>end){toast('End date must be after start','error');return;}
  const leaves=getLeaves();
  const days=Math.round((new Date(end)-new Date(start))/86400000)+1;
  leaves.push({id:nextId(leaves),userId:currentUser.id,type,startDate:start,endDate:end,days,reason,status:'pending',createdAt:new Date().toISOString()});
  saveLeaves(leaves);navigate('/leaves/history');toast('Leave request submitted!');
}

// =================== LEAVE HISTORY ===================
function pageLeaveHistory(){
  const leaves=getLeaves().filter(l=>l.userId===currentUser.id).sort((a,b)=>b.startDate.localeCompare(a.startDate));
  return`
  <div>
    <div style="margin-bottom:18px"><h1 style="font-size:22px;font-weight:700">Leave History</h1><p style="color:#64748b;font-size:13px">All your leave requests.</p></div>
    <div class="card"><div style="overflow-x:auto"><table>
      <thead><tr><th>Type</th><th>From</th><th>To</th><th>Days</th><th>Reason</th><th>Status</th></tr></thead>
      <tbody>
        ${leaves.length===0?'<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:32px">No leave requests yet</td></tr>':
        leaves.map(l=>{
          const days=l.days||(Math.round((new Date(l.endDate)-new Date(l.startDate))/86400000)+1);
          return`<tr>
            <td>${attBadge(l.type)}</td>
            <td>${fmtDate(l.startDate)}</td><td>${fmtDate(l.endDate)}</td>
            <td style="text-align:center">${days}</td>
            <td style="font-size:12px;color:#64748b;max-width:150px">${l.reason}</td>
            <td>${attBadge(l.status)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div></div>
  </div>`;
}

// =================== PROFILE ===================
function pageProfile(){
  const u=getUsers().find(x=>x.id===currentUser.id)||currentUser;
  const now=new Date();const m=now.getMonth()+1;const y=now.getFullYear();
  const c=calcSalary(u.id,m,y);
  const salRec=getSal().find(s=>s.userId===u.id&&s.month===m&&s.year===y);
  return`
  <div style="max-width:640px">
    <div style="margin-bottom:18px"><h1 style="font-size:22px;font-weight:700">My Profile</h1><p style="color:#64748b;font-size:13px">Personal details and salary slip.</p></div>
    <div class="card" style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
      <div style="width:52px;height:52px;border-radius:50%;background:#0f766e;color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0">${u.name.charAt(0)}</div>
      <div><div style="font-size:17px;font-weight:700">${u.name}</div><div style="color:#64748b;font-size:13px">${u.designation||u.role}</div></div>
    </div>
    <div style="display:flex;gap:0;border-bottom:2px solid #e2e8f0;margin-bottom:14px">
      <button id="tab1" onclick="showTab('info')" style="padding:9px 18px;border:none;background:none;cursor:pointer;font-weight:600;font-size:13px;color:#0f766e;border-bottom:2px solid #0f766e;margin-bottom:-2px">Personal Info</button>
      <button id="tab2" onclick="showTab('salary')" style="padding:9px 18px;border:none;background:none;cursor:pointer;font-size:13px;color:#64748b">Salary Slip</button>
    </div>
    <div id="tabInfo">
      <div class="card" style="margin-bottom:12px">
        <h3 style="font-weight:600;margin-bottom:12px;font-size:13px">Contact Details</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div style="grid-column:1/-1"><label class="label">Full Name</label><input class="input" id="p_name" value="${u.name}" /></div>
          <div><label class="label">Email</label><input class="input" id="p_email" value="${u.email||''}" /></div>
          <div><label class="label">Phone</label><input class="input" id="p_phone" value="${u.phone||''}" /></div>
        </div>
        <div style="margin-top:10px;text-align:right"><button class="btn btn-primary" onclick="saveProfile()">Save</button></div>
      </div>
      <div class="card" style="margin-bottom:12px">
        <h3 style="font-weight:600;margin-bottom:12px;font-size:13px">Employment Details</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px">
          <div><div style="color:#64748b;font-size:11px">Department</div><div style="font-weight:500">${u.department||'—'}</div></div>
          <div><div style="color:#64748b;font-size:11px">Designation</div><div style="font-weight:500">${u.designation||'—'}</div></div>
          <div><div style="color:#64748b;font-size:11px">Monthly Salary</div><div style="font-weight:500">${rupee(u.monthlySalary)}</div></div>
          <div><div style="color:#64748b;font-size:11px">Username</div><div style="font-weight:500">${u.username}</div></div>
        </div>
      </div>
      <div class="card">
        <h3 style="font-weight:600;margin-bottom:12px;font-size:13px">Change Password</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div style="grid-column:1/-1"><label class="label">Current Password</label><input class="input" type="password" id="p_curpass" /></div>
          <div><label class="label">New Password</label><input class="input" type="password" id="p_newpass" /></div>
          <div><label class="label">Confirm</label><input class="input" type="password" id="p_confpass" /></div>
        </div>
        <div style="margin-top:10px;text-align:right"><button class="btn btn-outline" onclick="changePassword()">Update</button></div>
      </div>
    </div>
    <div id="tabSalary" style="display:none">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <h3 style="font-weight:600;font-size:13px">Salary Slip — ${monthName(m)} ${y}</h3>
          <button class="btn btn-outline btn-sm" onclick="printSlip()">🖨 Print</button>
        </div>
        ${salarySlipHtml(u,c,salRec,m,y)}
      </div>
    </div>
  </div>`;
}
function salarySlipHtml(u,c,salRec,m,y){
  return`<div id="slipContent" style="border:1px solid #e2e8f0;border-radius:10px;padding:18px">
    <div style="display:flex;justify-content:space-between;border-bottom:1px solid #e2e8f0;padding-bottom:12px;margin-bottom:12px">
      <div><div style="font-size:16px;font-weight:700;color:#0f766e">Airdoor HR</div><div style="font-size:11px;color:#94a3b8">Salary Slip</div></div>
      <div style="text-align:right"><div style="font-weight:600;font-size:13px">${monthName(m)} ${y}</div><span class="badge ${salRec&&salRec.status==='approved'?'badge-green':'badge-yellow'}">${salRec?salRec.status:'draft'}</span></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px;margin-bottom:14px">
      <div><div style="color:#64748b">Employee</div><div style="font-weight:600">${u.name}</div></div>
      ${u.designation?`<div><div style="color:#64748b">Designation</div><div style="font-weight:600">${u.designation}</div></div>`:''}
    </div>
    <table style="margin-bottom:12px">
      <thead><tr><th>Earnings</th><th>Days</th><th style="text-align:right">Amount</th></tr></thead>
      <tbody>
        <tr><td>Monthly CTC</td><td>${c.workDays}</td><td style="text-align:right">${rupee(c.monthly)}</td></tr>
        <tr><td>Paid Days</td><td>${c.paid.toFixed(1)}</td><td style="text-align:right;color:#16a34a;font-weight:600">${rupee(c.gross)}</td></tr>
      </tbody>
    </table>
    <table style="margin-bottom:12px">
      <thead><tr><th>Deductions</th><th style="text-align:right">Amount</th></tr></thead>
      <tbody><tr><td>Loss of Pay (LOP)</td><td style="text-align:right;color:#ef4444">${rupee(c.deductions)}</td></tr></tbody>
    </table>
    <div style="display:flex;justify-content:space-between;align-items:center;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px 14px">
      <span style="font-weight:600;font-size:13px">Net Salary Payable</span>
      <span style="font-size:18px;font-weight:700;color:#0f766e">${rupee(c.net)}</span>
    </div>
    <p style="text-align:center;color:#94a3b8;font-size:10px;margin-top:10px">Formula: Monthly ÷ ${c.workDays} × Paid Days</p>
  </div>`;
}
function showTab(tab){
  document.getElementById('tabInfo').style.display=tab==='info'?'':'none';
  document.getElementById('tabSalary').style.display=tab==='salary'?'':'none';
  document.getElementById('tab1').style.cssText=`padding:9px 18px;border:none;background:none;cursor:pointer;font-size:13px;${tab==='info'?'font-weight:600;color:#0f766e;border-bottom:2px solid #0f766e;margin-bottom:-2px':'color:#64748b;'}`;
  document.getElementById('tab2').style.cssText=`padding:9px 18px;border:none;background:none;cursor:pointer;font-size:13px;${tab==='salary'?'font-weight:600;color:#0f766e;border-bottom:2px solid #0f766e;margin-bottom:-2px':'color:#64748b;'}`;
}
function saveProfile(){
  const name=document.getElementById('p_name').value.trim();
  const email=document.getElementById('p_email').value.trim();
  const phone=document.getElementById('p_phone').value.trim();
  if(!name){toast('Name required','error');return;}
  const users=getUsers();const i=users.findIndex(u=>u.id===currentUser.id);
  if(i>=0){users[i]={...users[i],name,email,phone};currentUser={...currentUser,name,email,phone};sessionStorage.setItem('hr_session',JSON.stringify(currentUser));}
  saveUsers(users);toast('Profile saved');renderSidebar();
}
function changePassword(){
  const cur=document.getElementById('p_curpass').value;
  const nw=document.getElementById('p_newpass').value;
  const cf=document.getElementById('p_confpass').value;
  const users=getUsers();const u=users.find(x=>x.id===currentUser.id);
  if(!u||u.password!==cur){toast('Current password incorrect','error');return;}
  if(nw.length<6){toast('New password must be ≥ 6 characters','error');return;}
  if(nw!==cf){toast('Passwords do not match','error');return;}
  const i=users.findIndex(x=>x.id===currentUser.id);
  users[i].password=nw;saveUsers(users);toast('Password updated');
}
function printSlip(){
  const content=document.getElementById('slipContent').innerHTML;
  const win=window.open('','_blank');
  win.document.write(`<html><head><title>Salary Slip</title><style>body{font-family:Arial,sans-serif;margin:32px;color:#111}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:8px 12px;text-align:left}th{background:#f8f8f8}</style></head><body>${content}</body></html>`);
  win.document.close();win.focus();win.print();win.close();
}

// =================== MODAL ===================
function openModal(html){
  document.getElementById('modalInner').innerHTML=html;
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}

// =================== TOAST ===================
let toastTimer=null;
function toast(msg,type='success'){
  const el=document.getElementById('toastEl');
  el.textContent=msg;
  el.className=`toast toast-${type}`;
  el.style.display='block';
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.style.display='none';},3000);
}

// =================== INIT ===================
init();
</script>
</body>
</html>
