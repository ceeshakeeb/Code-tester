<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Airdoor Staff Portal</title>
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<!-- Login Page -->
<div id="loginPage" style="display:none;position:fixed;inset:0;z-index:500;background:linear-gradient(160deg,#15283D 0%,#224366 50%,#3E75A5 100%);align-items:center;justify-content:center;flex-direction:column;padding:24px">
  <div style="width:100%;max-width:380px">
    <div style="text-align:center;margin-bottom:32px">
      <img src="" class="app-logo" style="height:56px;width:auto;margin-bottom:10px">
      <div style="color:#A3CBE5;font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:6px">STAFF PORTAL</div>
      <div style="color:rgba(163,203,229,.6);font-size:11px;font-style:italic">Not bought, it's built by Airdoor IT team</div>
    </div>
    <div style="background:rgba(255,255,255,.07);backdrop-filter:blur(12px);border:1px solid rgba(163,203,229,.2);border-radius:16px;padding:28px 24px">
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:12px;font-weight:600;color:#A3CBE5;margin-bottom:6px">Username</label>
        <input id="li_u" class="input" placeholder="Enter username" onkeydown="if(event.key==='Enter')document.getElementById('li_p').focus()" style="background:rgba(255,255,255,.1);border-color:rgba(163,203,229,.3);color:#fff;"/>
      </div>
      <div style="margin-bottom:8px">
        <label style="display:block;font-size:12px;font-weight:600;color:#A3CBE5;margin-bottom:6px">Password</label>
        <input id="li_p" class="input" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLoginSubmit()" style="background:rgba(255,255,255,.1);border-color:rgba(163,203,229,.3);color:#fff;"/>
      </div>
      <div id="li_err" style="display:none;color:#fca5a5;font-size:12px;margin-bottom:10px;padding:8px 10px;background:rgba(239,68,68,.15);border-radius:8px"></div>
      <button onclick="doLoginSubmit()" style="width:100%;padding:12px;background:linear-gradient(135deg,#3E75A5,#224366);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;letter-spacing:.5px">Sign In →</button>
    </div>
    <div style="text-align:center;margin-top:20px;color:rgba(163,203,229,.4);font-size:11px">© <span class="app-company-name">Airdoor MEP Solutions</span></div>
  </div>
</div>

<!-- Daily reminder banner -->
<div id="reminderBanner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:300;background:linear-gradient(90deg,#15283D,#3E75A5);color:#fff;padding:10px 16px;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 4px 16px rgba(0,0,0,.3)">
  <div style="display:flex;align-items:center;gap:10px">
    <span style="font-size:20px">⏰</span>
    <div>
      <div style="font-size:13px;font-weight:700">Attendance Reminder</div>
      <div style="font-size:11px;color:#A3CBE5">You haven't submitted attendance for today yet!</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;flex-shrink:0">
    <button onclick="go('/att/submit');document.getElementById('reminderBanner').style.display='none'" style="padding:6px 12px;background:#A3CBE5;color:#15283D;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">Submit Now</button>
    <button onclick="document.getElementById('reminderBanner').style.display='none'" style="padding:6px 10px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer">✕</button>
  </div>
</div>

<div id="app" style="display:none">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div style="padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #334155">
      <img src="" class="app-logo" style="height:28px;width:auto">Staff Portal</span>
    </div>
    <nav id="sideNav" style="flex:1;padding:10px 0;overflow-y:auto"></nav>
    <div style="padding:10px 8px;border-top:1px solid #334155">
      <div id="sideUser" style="padding:8px 12px;font-size:12px;color:#94a3b8;margin-bottom:4px"></div>
      <!-- Switch -->
      <div style="position:relative" id="switchWrap">
        <div class="nav-item" style="justify-content:space-between" onclick="toggleSwitch()">
          <span>⇄ Switch Account</span>
          <span id="swChev" style="transition:transform .2s">▾</span>
        </div>
        <div class="switch-menu" id="switchMenu"></div>
      </div>
      <div class="nav-item" onclick="doLogout()">⎋ Logout</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Mobile header -->
    <div class="mob-header no-print">
      <div style="display:flex;align-items:center;gap:8px">
        <button onclick="openDrawer()" style="background:none;border:none;padding:4px;cursor:pointer;display:flex;align-items:center">
          <svg width="22" height="22" fill="none" stroke="#A3CBE5" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <img src="" class="app-logo" style="height:24px;width:auto">
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <div style="position:relative">
          <button onclick="toggleMobSwitch()" style="padding:5px 12px;border:1px solid #3E75A5;border-radius:20px;background:rgba(62,117,165,.2);font-size:11px;font-weight:600;color:#A3CBE5;cursor:pointer">⇄ Switch</button>
          <div id="mobSwitchMenu" style="display:none;position:absolute;top:calc(100%+4px);right:0;background:#fff;border:1px solid #e2e8f0;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:160px;z-index:99;overflow:hidden"></div>
        </div>
        <div style="position:relative">
          <button onclick="toggleNotif()" style="padding:6px;border:none;background:none;cursor:pointer;position:relative;display:flex">
            <svg width="20" height="20" fill="none" stroke="#A3CBE5" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span id="nbadge" class="ndot" style="display:none">0</span>
          </button>
          <div class="npanel" id="notifPanel">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #f1f5f9">
              <span style="font-weight:600;font-size:13px">Notifications</span>
              <button onclick="markAllRead()" style="font-size:11px;color:#0f766e;background:none;border:none;cursor:pointer">Mark all read</button>
            </div>
            <div id="notifList" style="max-height:320px;overflow-y:auto"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="main-pad" id="page"></div>
  </div>

  <!-- Bottom nav (employee) -->




  <!-- Mobile drawer overlay -->
  <div id="drawerOverlay" onclick="closeDrawer()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150"></div>
  <!-- Mobile drawer (slide-in sidebar) -->
  <div id="mobDrawer" style="position:fixed;top:0;left:0;bottom:0;width:280px;background:#1e293b;z-index:160;transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column;overflow-y:auto">
    <div style="padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155">
      <div style="display:flex;align-items:center;gap:10px">
        <img src="" class="app-logo" style="height:26px;width:auto"><span style="font-weight:700;font-size:12px;color:#e2e8f0">Staff Portal</span>
      </div>
      <button onclick="closeDrawer()" style="background:none;border:none;color:#94a3b8;cursor:pointer;padding:4px">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <!-- Drawer user info -->
    <div id="drawerUser" style="padding:14px 16px;border-bottom:1px solid #334155;font-size:12px;color:#94a3b8"></div>
    <!-- Drawer nav -->
    <nav id="drawerNav" style="flex:1;padding:10px 0;overflow-y:auto"></nav>
    <!-- Drawer footer -->
    <div style="padding:10px 8px;border-top:1px solid #334155">
      <div style="position:relative;margin-bottom:4px" id="drawerSwitchWrap">
        <div class="nav-item" style="justify-content:space-between" onclick="toggleDrawerSwitch()">
          <span>⇄ Switch Account</span>
          <span id="drawerSwChev" style="transition:transform .2s">▾</span>
        </div>
        <div id="drawerSwitchMenu" style="background:#0f1729;border-radius:8px;margin:2px 4px;overflow:hidden;display:none"></div>
      </div>
      <div class="nav-item" onclick="doLogout();closeDrawer()">⎋ Logout</div>
    </div>
  </div>
</div>

<div id="fsLoadOverlay" style="display:none;position:fixed;inset:0;background:#15283D;z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:20px">
  <img src="" class="app-logo" style="height:52px;width:auto;opacity:.95">
  <div style="color:#A3CBE5;font-size:12px;font-weight:600;letter-spacing:.5px;font-family:-apple-system,sans-serif">STAFF PORTAL</div>
  <div style="width:44px;height:44px;border:3px solid #224366;border-top-color:#A3CBE5;border-radius:50%;animation:spin 0.8s linear infinite"></div>
  <div style="color:#3E75A5;font-size:11px;font-style:italic;font-family:-apple-system,sans-serif">Not bought, it's built by Airdoor IT team</div>
</div>


<!-- Modal -->
<div id="modal" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modalBox"></div>
</div>
<div id="toast" class="toast toast-ok" style="display:none"></div>

<!-- Firebase SDK -->

<!-- Firebase SDK -->
<script type="module" src="js/firebase-init.js"></script>

<script src="js/app.js"></script>
</body>
</html>
